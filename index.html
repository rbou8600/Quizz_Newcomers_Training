        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #0c1a2f 0%, #071126 100%);
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px 16px;
        }

        .game-container {
            max-width: 1000px;
            width: 100%;
            background: #ffffff;
            border-radius: 2rem;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.4);
            overflow: hidden;
        }

        .game-header {
            background: #0a1c2f;
            padding: 1.2rem 1.8rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            border-bottom: 3px solid #e94560;
        }

        .game-title h2 {
            color: white;
            font-size: 1.5rem;
            letter-spacing: -0.3px;
            font-weight: 800;
        }
        .credit-line {
            font-size: 0.7rem;
            color: #bfd9ff;
            font-style: italic;
        }

        .lang-selector {
            display: flex;
            gap: 8px;
            background: #071126aa;
            padding: 6px 12px;
            border-radius: 60px;
            backdrop-filter: blur(4px);
        }
        .lang-btn {
            background: transparent;
            border: 1px solid white;
            color: white;
            padding: 4px 12px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        .lang-btn.active {
            background: #e94560;
            border-color: #e94560;
        }

        .score-board {
            background: #00000066;
            backdrop-filter: blur(4px);
            border-radius: 60px;
            padding: 6px 20px;
            color: white;
            font-weight: bold;
            font-family: monospace;
        }

        .trainee-badge {
            background: #e94560;
            border-radius: 40px;
            padding: 5px 18px;
            font-weight: 600;
            font-size: 0.85rem;
            color: white;
        }

        .game-body {
            padding: 28px 30px 32px;
        }

        .name-screen {
            text-align: center;
            padding: 20px 10px;
        }
        .name-input-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin: 30px 0;
        }
        .name-input-group input {
            padding: 14px 22px;
            font-size: 1rem;
            width: 260px;
            border: 2px solid #cddfe7;
            border-radius: 60px;
            text-align: center;
        }
        .start-btn {
            background: #0f3460;
            border: none;
            color: white;
            font-weight: bold;
            padding: 12px 32px;
            border-radius: 40px;
            cursor: pointer;
        }
        .start-btn:hover { background: #e94560; }

        .scenario-card {
            background: #f4f8fe;
            padding: 1.5rem;
            border-radius: 1.5rem;
            border-left: 8px solid #e94560;
            margin-bottom: 24px;
            font-weight: 500;
            line-height: 1.4;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
        }
        .option-btn {
            background: #f0f2f5;
            border: 2px solid #e2e8f0;
            border-radius: 18px;
            padding: 12px 18px;
            text-align: left;
            cursor: pointer;
            font-weight: 500;
        }
        .option-btn:hover:not(:disabled) {
            background: #e2e8f0;
            transform: translateX(4px);
        }

        .feedback-panel {
            background: #f1f5f9;
            border-radius: 20px;
            padding: 16px;
            margin: 12px 0;
            display: none;
            border-left: 5px solid;
        }
        .feedback-correct { display: block; background: #e6f9ed; border-left-color: #2e7d32; }
        .feedback-wrong { display: block; background: #fff0f0; border-left-color: #c62828; }
        .doc-ref {
            font-family: monospace;
            background: #eef2ff;
            padding: 6px 10px;
            border-radius: 14px;
            margin-top: 8px;
            font-size: 0.8rem;
        }
        .btn-next {
            background: #0f3460;
            border: none;
            color: white;
            font-weight: bold;
            padding: 12px 28px;
            border-radius: 40px;
            width: 100%;
            max-width: 260px;
            display: block;
            margin: 16px auto 0;
            cursor: pointer;
        }
        .btn-next:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-cancel {
            background: transparent;
            border: 2px solid #e94560;
            color: #e94560;
            font-weight: bold;
            padding: 8px 22px;
            border-radius: 40px;
            width: 100%;
            max-width: 260px;

            font-size: 0.85rem;
            transition: 0.2s;

        .restart-btn {

            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: bold;
            color: white;
            margin-top: 20px;
            cursor: pointer;

        .score-summary {
            background: #eef2ff;
            padding: 20px;
            border-radius: 28px;
            margin-top: 20px;
        }
        .game-footer {
            font-size: 0.7rem;
            text-align: center;
            color: #6c7a8e;
            margin-top: 20px;

            .game-body { padding: 20px 16px; }
            .game-header { flex-direction: column; align-items: stretch; }

        .pc-bg { position:absolute; inset:0; }
        .pc-grid { position:absolute; inset:0; background-image: linear-gradient(rgba(30,200,120,0.07) 1px,transparent 1px),linear-gradient(90deg,rgba(30,200,120,0.07) 1px,transparent 1px); background-size:28px 28px; }

<button id="musicToggle" onclick="toggleMusic()" style="position:fixed;bottom:18px;right:18px;z-index:9999;background:#0a1c2f;border:2px solid #e94560;color:white;border-radius:50%;width:44px;height:44px;font-size:1.3rem;cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,0.4);">🔇</button>
<script>
  var _musicPlaying = false;
  var _bgMusic = null;
  function initMusic(){
    _bgMusic = document.getElementById('bgMusic');
    if(!_bgMusic) return;
    _bgMusic.volume = 0.35;
  }
  function toggleMusic(){
    if(!_bgMusic) initMusic();
    var btn = document.getElementById('musicToggle');
    if(_musicPlaying){ _bgMusic.pause(); _musicPlaying=false; btn.textContent='🔇'; }
    else { _bgMusic.play().catch(()=>{}); _musicPlaying=true; btn.textContent='🔊'; }
  }
  document.addEventListener('DOMContentLoaded', function(){ initMusic(); });
</script>

    const QUESTIONS_NL = QUESTIONS_EN;
    const QUESTIONS_FR = QUESTIONS_EN;
    const QUESTIONS_ZH = QUESTIONS_EN;
    const QUESTIONS_IT = QUESTIONS_EN;


    // ---- Game state ----
    let currentLang = "en";
    let currentQuestions = [...QUESTIONS_EN];
    let traineeName = "";
    let roundActive = false;
    let currentIndex = 0;
    let score = 0;
    let answered = false;
    let selectedOpt = null;
    let roundQuestions = [];
    let timerInterval = null;
    let timeLeft = 30;

    const root = document.getElementById("gameRoot");

    function getLangText(key) { return TRANSLATIONS[currentLang][key] || key; }

    // ---- Leaderboard (localStorage) ----
    function getLbKey(lang) { return 'lb_' + lang; }
    function getLeaderboard(lang) {
        try { return JSON.parse(localStorage.getItem(getLbKey(lang)) || '[]'); } catch(e) { return []; }
    }
    function saveScore(lang, name, score, total) {
        let lb = getLeaderboard(lang);
        lb.push({ name, score, pct: Math.round(score/total*100) });
        lb.sort((a,b) => b.score - a.score || b.pct - a.pct);
        lb = lb.slice(0, 3);
        try { localStorage.setItem(getLbKey(lang), JSON.stringify(lb)); } catch(e) {}
    }
    function renderLeaderboard() {
        const lb = getLeaderboard(currentLang);
        const medals = ['🥇','🥈','🥉'];
        const lbLabels = { en: '🏆 TOP 3 SCORES', nl: '🏆 TOP 3 SCORES', fr: '🏆 TOP 3 MEILLEURS', zh: '🏆 前3名成绩', it: '🏆 TOP 3 PUNTEGGI' };
        const title = lbLabels[currentLang] || '🏆 TOP 3 SCORES';
        if (!lb || lb.length === 0) {
            return `<div class="leaderboard-section"><h4>${title}</h4><div class="lb-empty">No scores yet – be the first!</div></div>`;
        }
        const rows = lb.map((e,i) => `<div class="lb-row"><span class="lb-medal">${medals[i]||''}</span><span class="lb-name">${escapeHtml(e.name)}</span><span class="lb-score">${e.score}/20 (${e.pct}%)</span></div>`).join('');
        return `<div class="leaderboard-section"><h4>${title}</h4>${rows}</div>`;
    }

    // ---- Timer ----
    function clearTimer() { if(timerInterval) { clearInterval(timerInterval); timerInterval = null; } }
    function startTimer(onExpire) {
        clearTimer();
        timeLeft = 30;
        updateTimerUI();
        timerInterval = setInterval(() => {
            timeLeft--;
            updateTimerUI();
            if (timeLeft <= 0) {
                clearTimer();
                onExpire();
            }
        }, 1000);
    }
    function updateTimerUI() {
        const bar = document.getElementById('timerBar');
        const lbl = document.getElementById('timerLabel');
        if (!bar || !lbl) return;
        const pct = (timeLeft / 30) * 100;
        bar.style.width = pct + '%';
        lbl.textContent = timeLeft + 's';
        bar.className = 'timer-bar' + (timeLeft <= 5 ? ' danger' : timeLeft <= 10 ? ' warning' : '');
    }

                else if (currentLang === "it") currentQuestions = [...QUESTIONS_IT];
                renderNameScreen();
            });
        });
        document.getElementById("startGameBtn").addEventListener("click", () => {
            let name = document.getElementById("traineeNameInput").value.trim();
            traineeName = name || "Trainee";
            roundQuestions = [...currentQuestions];
            for (let i = roundQuestions.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [roundQuestions[i], roundQuestions[j]] = [roundQuestions[j], roundQuestions[i]];
            }
            roundQuestions = roundQuestions.slice(0, 20);
            currentIndex = 0; score = 0; answered = false; selectedOpt = null; roundActive = true;
            renderQuestion();
        });
    }

    function renderQuestion() {
        if (!roundActive || currentIndex >= roundQuestions.length) { finishRound(); return; }
        const q = roundQuestions[currentIndex];
        const isMulti = q.multi === true;
        const multiHint = isMulti ? `<div class="multi-hint">☑ Select ALL correct answers, then validate</div>` : '';

        const optsHtml = q.options.map((opt, idx) => {
            if (isMulti) {
                return `<button class="option-btn multi-mode" data-opt="${idx}"><span class="opt-check"></span>${String.fromCharCode(65+idx)}. ${escapeHtml(opt)}</button>`;
            } else {
                return `<button class="option-btn" data-opt="${idx}">${String.fromCharCode(65+idx)}. ${escapeHtml(opt)}</button>`;
            }
        }).join('');

        root.innerHTML = `
            <div class="game-container">
                <div class="game-header">
                    <div class="game-title"><h2>${getLangText("appTitle")}</h2><div class="credit-line">${getLangText("credit")}</div></div>
                    <div class="trainee-badge">${getLangText("traineeLabel")} ${escapeHtml(traineeName)}</div>
                    <div class="score-board">⭐ ${score}/${currentIndex}</div>
                </div>
                <div class="game-body">
                    <div class="timer-label" id="timerLabel">30s</div>
                    <div class="timer-bar-wrap"><div class="timer-bar" id="timerBar" style="width:100%"></div></div>
                    <div class="scenario-card">📌 <strong>${currentIndex+1}/${roundQuestions.length}</strong><br>${escapeHtml(q.text)}</div>
                    ${multiHint}
                    <div class="options-list" id="optsList">${optsHtml}</div>
                    <div id="fbArea" class="feedback-panel" style="display:none;"></div>
                    <button class="btn-next" id="nextBtn" disabled>${getLangText("submitBtn")}</button>
                    <button class="btn-cancel" id="cancelBtn" onclick="cancelRound()">${getLangText("cancelBtn")}</button>
                    <div class="game-footer">🔍 ${isMulti ? 'Multiple answers possible — select all that apply.' : 'Select one answer, then validate.'}</div>
                </div>
            </div>
        `;

        // State
        let selectedSingle = null;
        let selectedMulti = new Set();

        // ── Timer expiry ──
        startTimer(() => {
            if (answered) return;
            const qq = roundQuestions[currentIndex];
            const fbDiv = document.getElementById("fbArea");
            const correctLetters = qq.correct.map(i => String.fromCharCode(65+i)).join(', ');
            const correctTexts = qq.correct.map(i => `${String.fromCharCode(65+i)}. ${qq.options[i]}`).join('<br>');
            fbDiv.innerHTML = `<strong>⏰ TIME'S UP!</strong><br>${getLangText("correctAnswer")}: ${correctLetters}<br>${correctTexts}<br><br>${escapeHtml(qq.explanation)}<div class="doc-ref">📄 ${escapeHtml(qq.docRef)}</div>`;
            fbDiv.className = "feedback-panel feedback-wrong";
            fbDiv.style.display = "block";
            document.querySelectorAll(".option-btn").forEach((btn2, idx) => {
                btn2.disabled = true;
                if (qq.correct.includes(idx)) { btn2.style.background = "#c8f0d1"; }
            });
            answered = true;
            const nextBtn = document.getElementById("nextBtn");
            nextBtn.disabled = false;
            nextBtn.innerText = (currentIndex+1 === roundQuestions.length) ? getLangText("finishBtn") : getLangText("nextBtn");
            const newNext = nextBtn.cloneNode(true);
            nextBtn.parentNode.replaceChild(newNext, nextBtn);
            newNext.addEventListener("click", () => {
                if (currentIndex+1 >= roundQuestions.length) finishRound();
                else { currentIndex++; answered = false; renderQuestion(); }
            });
        });

        // ── Option click handlers ──
        document.querySelectorAll(".option-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                if (answered) return;
                const idx = parseInt(btn.dataset.opt);
                if (isMulti) {
                    // Toggle selection
                    if (selectedMulti.has(idx)) {
                        selectedMulti.delete(idx);
                        btn.classList.remove("selected-multi");
                        btn.querySelector(".opt-check").textContent = "";
                    } else {
                        selectedMulti.add(idx);
                        btn.classList.add("selected-multi");
                        btn.querySelector(".opt-check").textContent = "✓";
                    }
                    document.getElementById("nextBtn").disabled = selectedMulti.size === 0;
                } else {
                    document.querySelectorAll(".option-btn").forEach(b => { b.style.background = "#f0f2f5"; });
                    btn.style.background = "#c1e0ff";
                    selectedSingle = idx;
                    document.getElementById("nextBtn").disabled = false;
                }
            });
        });

        // ── Submit ──
        document.getElementById("nextBtn").addEventListener("click", () => {
            if (answered) return;
            const qq = roundQuestions[currentIndex];
            const isM = qq.multi === true;
            if (isM && selectedMulti.size === 0) return;
            if (!isM && selectedSingle === null) return;

            clearTimer();
            answered = true;

            const correctSet = new Set(qq.correct);
            let isCorrect = false;

            if (isM) {
                // Exact match of selected set vs correct set
                isCorrect = selectedMulti.size === correctSet.size && [...selectedMulti].every(i => correctSet.has(i));
            } else {
                isCorrect = (selectedSingle === qq.correct[0]);
            }

            if (isCorrect) score++;

            const fbDiv = document.getElementById("fbArea");
            const correctLetters = qq.correct.map(i => String.fromCharCode(65+i)).join(', ');
            const correctTexts = qq.correct.map(i => `${String.fromCharCode(65+i)}. ${qq.options[i]}`).join('<br>');

            if (isCorrect) {
                fbDiv.innerHTML = `<strong>${getLangText("correctFeedback")}</strong><br>${escapeHtml(qq.explanation)}<div class="doc-ref">📄 ${escapeHtml(qq.docRef)}</div>`;
                fbDiv.className = "feedback-panel feedback-correct";
            } else {
                const yourChoiceText = isM
                    ? [...selectedMulti].map(i => `${String.fromCharCode(65+i)}. ${qq.options[i]}`).join(', ')
                    : `${String.fromCharCode(65+selectedSingle)}. ${qq.options[selectedSingle]}`;
                fbDiv.innerHTML = `<strong>${getLangText("wrongFeedback")}</strong><br>${getLangText("yourChoice")}: ${yourChoiceText}<br>${getLangText("correctAnswer")}: ${correctLetters}<br>${correctTexts}<br><br>${escapeHtml(qq.explanation)}<div class="doc-ref">📄 ${escapeHtml(qq.docRef)}</div>`;
                fbDiv.className = "feedback-panel feedback-wrong";
            }
            fbDiv.style.display = "block";

            // Color the buttons
            document.querySelectorAll(".option-btn").forEach((btn, idx) => {
                btn.disabled = true;
                if (correctSet.has(idx)) {
                    btn.style.background = "#c8f0d1";
                    btn.style.borderColor = "#2e7d32";
                } else if (isM && selectedMulti.has(idx) && !correctSet.has(idx)) {
                    btn.style.background = "#ffdddd";
                    btn.style.borderColor = "#c62828";
                } else if (!isM && idx === selectedSingle && !correctSet.has(idx)) {
                    btn.style.background = "#ffdddd";
                    btn.style.borderColor = "#c62828";
                }
            });

            const nextBtn = document.getElementById("nextBtn");
            nextBtn.innerText = (currentIndex+1 === roundQuestions.length) ? getLangText("finishBtn") : getLangText("nextBtn");
            const newNext = nextBtn.cloneNode(true);
            nextBtn.parentNode.replaceChild(newNext, nextBtn);
            newNext.addEventListener("click", () => {
                if (currentIndex+1 >= roundQuestions.length) finishRound();
                else { currentIndex++; answered = false; renderQuestion(); }
            });
        });
    }

        function finishRound() {
        clearTimer();
        const total = roundQuestions.length;
        saveScore(currentLang, traineeName, score, total);
        root.innerHTML = `
            <div class="game-container">
                <div class="game-header"><div class="game-title"><h2>${getLangText("appTitle")}</h2><div class="credit-line">${getLangText("credit")}</div></div></div>
                <div class="game-body result-area">
                    <div class="score-summary">🎯 <strong>${escapeHtml(traineeName)}</strong> ${getLangText("finalScoreMsg")} <strong style="font-size:2rem;">${score}</strong> ${getLangText("upTo")} ${total}.<br>(${score}/${total} · ${Math.round(score/total*100)}%)<br>${Math.round(score/total*100) >= 70 ? getLangText("passMsg") : getLangText("failMsg")}</div>
                    <button class="restart-btn" id="restartBtn">${getLangText("newRound")}</button>
                </div>
                <div class="game-footer">GOFO Europe — New Joiner Orientation Quiz &bull; Xinglian Century Internal Training</div>
            </div>
        `;
        document.getElementById("restartBtn").addEventListener("click", () => { roundActive = false; renderNameScreen(); });
    }

    function escapeHtml(str) { if (!str) return ""; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }

    function cancelRound() {
        clearTimer();
        roundActive = false;
        answered = false;
        renderNameScreen();
    }

    renderNameScreen();
</script>
</body>
</html>
